services:
  api:
    build: .
    ports:
      - "3002:3002"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: lootcodes
      POSTGRES_PASSWORD: lootcodes_dev
      POSTGRES_DB: lootcodes_test
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lootcodes"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
